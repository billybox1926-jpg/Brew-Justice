name: Godot CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  godot-headless-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.4 Linux
        run: |
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.4-stable_linux.x86_64

      - name: Verify project loads headlessly
        run: /tmp/godot/Godot_v4.4-stable_linux.x86_64 --headless --path vertical-slice/godot --quit
