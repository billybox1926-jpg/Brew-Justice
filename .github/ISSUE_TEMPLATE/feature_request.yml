name: Feature Request
description: Suggest a new feature or improvement for the project.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the user-facing improvement and how contributors can implement it.
  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: Who is this for and what problem does it solve?
      placeholder: |
        As a player with [accessibility need], I want [capability] so that [outcome].
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Checklist of what "done" looks like.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Target milestone
      description: Which milestone should own this work?
      options:
        - "#2 Vertical Slice Polish"
        - "#3 Sensory Systems"
        - "#4 Narrative & World"
        - "#5 Accessibility Audit"
        - "Unsure"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches explored and why they were rejected.
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, PRs, docs, or external research.
